services:
    backend:
        build: ./backend
        container_name: stadium-backend
        ports:
            - "8080:8080"
        environment:
            - PORT=8080
            - GCP_PROJECT_ID=promptwars-493516
            - FRONTEND_URL=http://localhost:3000
            - PUBSUB_ENABLED=false
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    frontend:
        build: ./frontend
        container_name: stadium-frontend
        ports:
            - "3000:80"
        depends_on:
            backend:
                condition: service_healthy
