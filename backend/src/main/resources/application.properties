# Application Configuration
server.port=${PORT:8080}
spring.application.name=smart-stadium

# Active profile (use 'cloud' for GCP deployment)
# spring.profiles.active=cloud

# Google Cloud Configuration
spring.cloud.gcp.project-id=${GCP_PROJECT_ID:promptwars-493516}

# Pub/Sub Configuration
spring.cloud.gcp.pubsub.enabled=${PUBSUB_ENABLED:false}

# Firestore Configuration (auto-configured by spring-cloud-gcp-starter-data-firestore)

# Frontend URL for CORS
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Logging
logging.level.com.smartstadium=INFO
logging.level.root=WARN

# Actuator - expose health endpoint only
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Disable Spring Data Firestore and Pub/Sub auto-config in local profile
spring.autoconfigure.exclude=com.google.cloud.spring.autoconfigure.firestore.GcpFirestoreAutoConfiguration,\
  com.google.cloud.spring.autoconfigure.firestore.FirestoreRepositoriesAutoConfiguration,\
  com.google.cloud.spring.autoconfigure.firestore.FirestoreTransactionManagerAutoConfiguration,\
  com.google.cloud.spring.autoconfigure.pubsub.GcpPubSubAutoConfiguration
