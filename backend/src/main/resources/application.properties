# Application Configuration
server.port=${PORT:8080}
spring.application.name=smart-stadium

# Google Cloud Configuration
spring.cloud.gcp.project-id=${GCP_PROJECT_ID:promptwars-493516}

# Features
spring.cloud.gcp.pubsub.enabled=${PUBSUB_ENABLED:false}
spring.cloud.gcp.trace.enabled=false
spring.cloud.gcp.logging.enabled=false

# Caching (in-memory, no Redis needed)
spring.cache.type=caffeine

# Frontend URL for CORS
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Logging
logging.level.com.smartstadium=INFO
logging.level.root=WARN

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Exclude GCP auto-configs that fail without credentials locally
spring.autoconfigure.exclude=com.google.cloud.spring.autoconfigure.trace.StackdriverTraceAutoConfiguration,\
com.google.cloud.spring.autoconfigure.logging.StackdriverLoggingAutoConfiguration
